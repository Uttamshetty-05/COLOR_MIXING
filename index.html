<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Three Color Mixer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎨 Mixing of colours</h1>

<div class="container">
    <div class="pickers">
        <label>Color 1</label>
        <input type="color" id="c1" value="#ff0000">

        <label>Color 2</label>
        <input type="color" id="c2" value="#00ff00">

        <label>Color 3</label>
        <input type="color" id="c3" value="#0000ff">
    </div>

    <div id="finalColor"></div>

    <div id="details">
        <p id="rgbValue">RGB: </p>
        <p id="hexValue">HEX: </p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
